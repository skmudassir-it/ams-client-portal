# ─────────────────────────────────────────────
# AMS Client Portal — Local Dev with Docker
# Start: docker compose up -d
# Stop:  docker compose down
# ─────────────────────────────────────────────

version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: ams-client-portal
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
      - dev-db:/app/prisma
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-change-in-production}
      - AUTH_URL=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dev-db:
    driver: local
